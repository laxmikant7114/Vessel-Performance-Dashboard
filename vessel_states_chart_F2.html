<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stark Vessel States - August 2025</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #2c3e50;
            font-size: 2.4rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            color: #7f8c8d;
            font-size: 1.05rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-group label {
            font-weight: 600;
            color: #2c3e50;
        }

        .control-group select,
        .control-group input {
            padding: 9px 14px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s ease;
            background: #fff;
        }

        .control-group select:focus,
        .control-group input:focus {
            outline: none;
            border-color: #3498db;
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #fff;
        }

        .btn-primary {
            background-color: #3498db;
        }

        .btn-primary:hover {
            background-color: #2980b9;
            transform: translateY(-1px);
        }

        .btn-success {
            background-color: #27ae60;
        }

        .btn-success:hover {
            background-color: #1e9a52;
            transform: translateY(-1px);
        }

        .legend {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 22px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            color: #2c3e50;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .charts-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-top: 16px;
        }

        .vessel-block {
            background: #fafafa;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            padding: 10px 14px 14px;
            overflow: hidden;
        }

        .vessel-title {
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .vessel-canvas {
            width: 100%;
            height: 160px;
            /* individual chart height */
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
            margin-top: 22px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 18px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .file-upload {
            text-align: center;
            margin: 18px 0 8px;
            padding: 28px;
            border: 2px dashed #bdc3c7;
            border-radius: 10px;
            background-color: #f8f9fa;
        }

        .file-upload h3 {
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .file-upload p {
            color: #7f8c8d;
            margin-bottom: 10px;
        }

        .loading {
            text-align: center;
            padding: 30px;
            font-size: 1.1rem;
            color: #3498db;
        }

        .error {
            text-align: center;
            padding: 16px;
            color: #e74c3c;
            background-color: #fdf2f2;
            border-radius: 8px;
            margin: 14px 0;
            border: 1px solid #f4c7c3;
        }

        /* ============= RESPONSIVE DESIGN ============= */

        /* Tablet Screens (1024px and below) */
        @media (max-width: 1024px) {
            .container {
                margin: 15px;
                padding: 15px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .header p {
                font-size: 0.95rem;
            }

            .controls {
                gap: 15px;
            }

            .control-group {
                gap: 8px;
            }

            .control-group label {
                font-size: 0.95rem;
            }

            .vessel-canvas {
                height: 140px;
            }

            .stats {
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
                gap: 15px;
            }

            .stat-number {
                font-size: 1.6rem;
            }

            .legend {
                gap: 16px;
            }

            .legend-color {
                width: 14px;
                height: 14px;
            }

            .legend-item {
                font-size: 0.9rem;
            }
        }

        /* Large Phones & Small Tablets (768px max) */
        @media (max-width: 768px) {
            body {
                font-size: 14px;
            }

            .container {
                margin: 10px;
                padding: 12px;
                border-radius: 8px;
            }

            .header {
                margin-bottom: 20px;
            }

            .header h1 {
                font-size: 1.5rem;
                margin-bottom: 6px;
                word-wrap: break-word;
            }

            .header p {
                font-size: 0.85rem;
            }

            .controls {
                flex-direction: column;
                gap: 10px;
                margin-bottom: 18px;
            }

            .control-group {
                width: 100%;
                flex-direction: column;
                gap: 6px;
            }

            .control-group label {
                font-size: 0.9rem;
            }

            .control-group select,
            .control-group input {
                width: 100%;
                padding: 8px 10px;
                font-size: 13px;
            }

            .btn {
                width: 100%;
                padding: 8px 12px;
                font-size: 13px;
            }

            .legend {
                gap: 12px;
                margin-bottom: 12px;
                padding: 0 5px;
            }

            .legend-item {
                font-size: 0.8rem;
                gap: 6px;
            }

            .legend-color {
                width: 12px;
                height: 12px;
            }

            .vessel-block {
                padding: 8px 10px 10px;
            }

            .vessel-title {
                font-size: 0.95rem;
                margin-bottom: 6px;
            }

            .vessel-canvas {
                height: 120px;
            }

            .charts-container {
                gap: 12px;
                margin-top: 12px;
            }

            .stats {
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                gap: 10px;
                margin-top: 16px;
            }

            .stat-card {
                padding: 12px;
                border-radius: 8px;
            }

            .stat-number {
                font-size: 1.4rem;
                margin-bottom: 3px;
            }

            .file-upload {
                margin: 12px 0 6px;
                padding: 18px;
            }

            .file-upload h3 {
                font-size: 0.95rem;
                margin-bottom: 6px;
            }

            .file-upload p {
                font-size: 0.8rem;
                margin-bottom: 8px;
            }

            .loading {
                padding: 20px;
                font-size: 0.95rem;
            }

            .error {
                padding: 12px;
                font-size: 0.85rem;
                margin: 10px 0;
            }
        }

        /* Small Phones (600px max) */
        @media (max-width: 600px) {
            body {
                font-size: 13px;
            }

            .container {
                margin: 8px;
                padding: 10px;
            }

            .header h1 {
                font-size: 1.3rem;
            }

            .header p {
                font-size: 0.8rem;
            }

            .controls {
                gap: 8px;
            }

            .control-group select,
            .control-group input {
                font-size: 12px;
                padding: 7px 8px;
            }

            .btn {
                padding: 7px 10px;
                font-size: 12px;
            }

            .legend {
                gap: 10px;
                margin-bottom: 10px;
            }

            .legend-item {
                font-size: 0.75rem;
            }

            .legend-color {
                width: 11px;
                height: 11px;
            }

            .vessel-canvas {
                height: 100px;
            }

            .vessel-title {
                font-size: 0.9rem;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }

            .stat-number {
                font-size: 1.2rem;
                margin-bottom: 2px;
            }

            .stat-card {
                padding: 10px;
            }
        }

        /* Extra Small Phones (480px max) */
        @media (max-width: 480px) {
            body {
                font-size: 12px;
            }

            .container {
                margin: 5px;
                padding: 8px;
                border-radius: 6px;
            }

            .header h1 {
                font-size: 1.1rem;
                margin-bottom: 5px;
            }

            .header p {
                font-size: 0.75rem;
            }

            .header {
                margin-bottom: 15px;
            }

            .controls {
                gap: 6px;
                margin-bottom: 15px;
            }

            .control-group {
                gap: 4px;
            }

            .control-group label {
                font-size: 0.8rem;
            }

            .control-group select,
            .control-group input {
                font-size: 11px;
                padding: 6px 6px;
            }

            .btn {
                padding: 6px 8px;
                font-size: 11px;
            }

            .legend {
                gap: 8px;
                margin-bottom: 8px;
            }

            .legend-item {
                font-size: 0.7rem;
                gap: 4px;
                flex-direction: column;
                text-align: center;
            }

            .legend-color {
                width: 10px;
                height: 10px;
                margin: 0 auto;
            }

            .vessel-block {
                padding: 6px 8px 8px;
                border-radius: 6px;
            }

            .vessel-title {
                font-size: 0.85rem;
                margin-bottom: 4px;
            }

            .vessel-canvas {
                height: 80px;
            }

            .charts-container {
                gap: 10px;
                margin-top: 10px;
            }

            .stats {
                grid-template-columns: 1fr;
                gap: 6px;
                margin-top: 12px;
            }

            .stat-card {
                padding: 8px;
            }

            .stat-number {
                font-size: 1rem;
            }

            .file-upload {
                margin: 10px 0 5px;
                padding: 12px;
            }

            .file-upload h3 {
                font-size: 0.85rem;
            }

            .file-upload p {
                font-size: 0.75rem;
            }

            .loading {
                padding: 15px;
                font-size: 0.85rem;
            }

            .error {
                padding: 10px;
                font-size: 0.75rem;
                margin: 8px 0;
            }
        }

        /* Landscape mode adjustments */
        @media (max-height: 600px) and (orientation: landscape) {
            .container {
                padding: 12px;
                margin-top: 10px;
                margin-bottom: 10px;
            }

            .header {
                margin-bottom: 12px;
            }

            .header h1 {
                font-size: 1.3rem;
                margin-bottom: 4px;
            }

            .controls {
                margin-bottom: 12px;
                gap: 12px;
            }

            .vessel-canvas {
                height: 150px;
            }

            .charts-container {
                gap: 12px;
            }

            .stats {
                margin-top: 12px;
                gap: 10px;
            }

            .stat-card {
                padding: 10px;
            }

            .stat-number {
                font-size: 1.2rem;
            }
        }

        /* Print styles */
        @media print {
            body {
                background: white;
            }

            .container {
                box-shadow: none;
                border-radius: 0;
                margin: 0;
            }

            .file-upload {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Stark Vessel States</h1>
            <p>Interactive Timeline Analysis - August 2025</p>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="vesselSelect">Vessel:</label>
                <select id="vesselSelect">
                    <option value="all">All Vessels</option>
                </select>
            </div>

            <div class="control-group">
                <label for="dateSelect">Date:</label>
                <input type="date" id="dateSelect" min="2025-08-01" max="2025-08-31" value="2025-08-01" />
            </div>

            <button class="btn btn-primary" onclick="filterByDate()">Filter by Date</button>
            <button class="btn btn-success" onclick="showFullTimeline()">Show Full Timeline</button>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-color" style="background-color: #4C5360;"></div>
                <span>In Port</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #94A0B2;"></div>
                <span>In Transit</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #81368F;"></div>
                <span>Project Point</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #FCB35C;"></div>
                <span>Out of Range</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #DCDCDC;"></div>
                <span>Stationary</span>
            </div>
        </div>

        <div id="chartsContainer" class="charts-container"></div>

        <div class="stats" id="statsContainer"></div>
    </div>

    <script>
        // ===== Global State =====
        let vesselData = {};
        let charts = {}; // vesselName -> Chart instance
        let isDataLoaded = false;

        // Canonical state colors
        const stateColors = {
            "In Port": "#4C5360",
            "In Transit": "#94A0B2",
            "Project Point": "#81368F",
            "Out of Range": "#FCB35C",
            "Stationary": "#DCDCDC"
        };

        // ===== Init =====
        document.addEventListener("DOMContentLoaded", function () {
            showFileUpload();
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById("vesselSelect").addEventListener("change", function () {
                if (!isDataLoaded) return;
                showFullTimeline();
            });
        }

        // ===== File Upload UI =====
        function showFileUpload() {
            const container = document.querySelector(".container");
            const fileUploadDiv = document.createElement("div");
            fileUploadDiv.className = "file-upload";
            fileUploadDiv.innerHTML = `
        <h3>Load Vessel Data</h3>
        <p>Please select the Stark vessel CSV files to analyze</p>
        <input type="file" id="csvFileInput" multiple accept=".csv" disabled style="opacity:0.5; cursor:not-allowed;" />
        <div style="margin-top:10px;">
          <button class="btn btn-primary" onclick="loadSelectedFiles()" disabled style="opacity:0.5; cursor:not-allowed;">Load Files</button>
        </div>
      `;
            const chartsContainer = document.getElementById("chartsContainer");
            container.insertBefore(fileUploadDiv, chartsContainer);
        }

        function hideFileUpload() {
            const fileUpload = document.querySelector(".file-upload");
            if (fileUpload) fileUpload.remove();
        }

        function showLoading(message) {
            const container = document.querySelector(".container");
            const loadingDiv = document.createElement("div");
            loadingDiv.className = "loading";
            loadingDiv.id = "loading";
            loadingDiv.textContent = message;
            container.appendChild(loadingDiv);
        }

        function hideLoading() {
            const loading = document.getElementById("loading");
            if (loading) loading.remove();
        }

        function showError(message) {
            const container = document.querySelector(".container");
            const errorDiv = document.createElement("div");
            errorDiv.className = "error";
            errorDiv.textContent = message;
            container.appendChild(errorDiv);
            setTimeout(() => errorDiv.remove(), 6000);
        }

        // ===== CSV Parsing =====
        function parseCSV(csvText) {
            const lines = csvText.trim().split("\n");
            const headers = lines[0].split(",").map((h) => h.trim());
            const data = [];

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const values = lines[i].split(",");
                const row = {};
                headers.forEach((header, index) => {
                    row[header] = values[index] ? values[index].trim() : "";
                });
                data.push(row);
            }
            return data;
        }

        function getVesselNameFromFile(filename) {
            const name = filename.replace("Stark_", "").replace("_Stark_output_elog.csv", "");
            return name
                .split("_")
                .map((word) => word.charAt(0).toUpperCase() + word.slice(1))
                .join(" ");
        }

        function normalizeState(stateRaw) {
            const s = String(stateRaw || "").trim().toLowerCase();
            if (s === "in port" || s === "inport") return "In Port";
            if (s === "in transit" || s === "intransit" || s === "in  transit") return "In Transit";
            if (s === "project point" || s === "projectpoint" || s === "project") return "Project Point";
            if (s === "out of range" || s === "outofrange" || s === "oor") return "Out of Range";
            if (s === "stationary" || s === "idle") return "Stationary";
            // fallback: capitalize words
            return stateRaw;
        }

        // ===== Load Files =====
        async function loadSelectedFiles() {
            const fileInput = document.getElementById("csvFileInput");
            const files = fileInput.files;

            if (files.length === 0) {
                alert("Please select CSV files to load.");
                return;
            }

            showLoading("Processing CSV files...");
            try {
                vesselData = {};

                for (const file of files) {
                    try {
                        const csvText = await file.text();
                        const rows = parseCSV(csvText);
                        const vesselName = getVesselNameFromFile(file.name);

                        const stateData = [];
                        rows.forEach((row) => {
                            if (row.from && row.to && row.state) {
                                stateData.push({
                                    state: normalizeState(row.state),
                                    start: row.from,
                                    end: row.to
                                });
                            }
                        });

                        if (stateData.length > 0) {
                            vesselData[vesselName] = stateData;
                        }
                        console.log(`Loaded ${stateData.length} records for ${vesselName}`);
                    } catch (err) {
                        console.warn(`Error processing ${file.name}:`, err);
                    }
                }

                hideLoading();
                updateVesselSelector();
                isDataLoaded = true;

                if (Object.keys(vesselData).length > 0) {
                    showFullTimeline();
                    hideFileUpload();
                } else {
                    showError("No valid vessel data found in the selected files.");
                }
            } catch (error) {
                hideLoading();
                console.error("Error loading vessel data:", error);
                showError("Error loading vessel data. Please check the console for details.");
            }
        }

        function updateVesselSelector() {
            const select = document.getElementById("vesselSelect");
            select.innerHTML = '<option value="all">All Vessels</option>';

            Object.keys(vesselData)
                .sort((a, b) => a.localeCompare(b))
                .forEach((vesselName) => {
                    const option = document.createElement("option");
                    option.value = vesselName;
                    option.textContent = vesselName;
                    select.appendChild(option);
                });
        }



        // ===== Chart Helpers =====
        function groupConsecutiveStates(data) {
            const groupedData = [];
            let current = null;

            data.forEach((entry) => {
                const st = normalizeState(entry.state);
                if (!current || current.state !== st) {
                    if (current) groupedData.push(current);
                    current = { state: st, start: entry.start, end: entry.end };
                } else {
                    // same state continues
                    current.end = entry.end;
                }
            });

            if (current) groupedData.push(current);
            return groupedData;
        }

        function filterDataForDate(data, dayStart, dayEnd) {
            const dayData = [];
            data.forEach((entry) => {
                const start = new Date(entry.start);
                const end = new Date(entry.end);
                if (start <= dayEnd && end >= dayStart) {
                    const overlapStart = new Date(Math.max(start.getTime(), dayStart.getTime()));
                    const overlapEnd = new Date(Math.min(end.getTime(), dayEnd.getTime()));
                    dayData.push({
                        state: normalizeState(entry.state),
                        start: overlapStart.toISOString(),
                        end: overlapEnd.toISOString()
                    });
                }
            });
            return dayData;
        }

        function clearCharts() {
            Object.values(charts).forEach((ch) => {
                try {
                    ch.destroy();
                } catch (_) { }
            });
            charts = {};
            const container = document.getElementById("chartsContainer");
            container.innerHTML = "";
        }

        function createVesselBlock(vesselName) {
            const block = document.createElement("div");
            block.className = "vessel-block";

            const title = document.createElement("div");
            title.className = "vessel-title";
            title.textContent = vesselName;

            const canvas = document.createElement("canvas");
            canvas.className = "vessel-canvas";
            canvas.height = 160;
            canvas.style.maxHeight = "160px";

            block.appendChild(title);
            block.appendChild(canvas);
            return { block, canvas };
        }

        function createVesselChart(canvas, vesselName, groupedData, xScaleOptions) {
            const datasets = [];
            Object.keys(stateColors).forEach((state) => {
                const stateData = groupedData
                    .filter((entry) => entry.state === state)
                    .map((entry) => ({
                        x: [new Date(entry.start), new Date(entry.end)],
                        y: vesselName
                    }));

                if (stateData.length > 0) {
                    datasets.push({
                        label: `${vesselName} - ${state}`,
                        data: stateData,
                        backgroundColor: stateColors[state],
                        borderColor: stateColors[state],
                        borderWidth: 1,
                        barThickness: 20,
                        categoryPercentage: 0.9,
                        barPercentage: 0.95
                    });
                }
            });

            const ctx = canvas.getContext("2d");
            return new Chart(ctx, {
                type: "bar",
                data: { datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    indexAxis: "y",
                    scales: {
                        x: xScaleOptions,
                        y: {
                            type: "category",
                            labels: [vesselName],
                            offset: true,
                            grid: { display: true, color: "rgba(0,0,0,0.06)" },
                            ticks: { font: { size: 12, weight: "bold" }, color: "#2c3e50" },
                            title: { display: false }
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                title: function (context) {
                                    return context[0].parsed.y || vesselName;
                                },
                                label: function (context) {
                                    const start = new Date(context.parsed.x[0]);
                                    const end = new Date(context.parsed.x[1]);
                                    const duration = (end - start) / (1000 * 60 * 60);
                                    const state = context.dataset.label.split(" - ")[1];
                                    return [
                                        `State: ${state}`,
                                        `Start: ${start.toLocaleDateString()} ${start.toLocaleTimeString()}`,
                                        `End: ${end.toLocaleDateString()} ${end.toLocaleTimeString()}`,
                                        `Duration: ${Number.isFinite(duration) ? duration.toFixed(1) : "0.0"} hours`
                                    ];
                                }
                            }
                        }
                    },
                    layout: { padding: { left: 6, right: 6, top: 4, bottom: 2 } }
                }
            });
        }

        // ===== Renderers =====
        function showFullTimeline() {
            if (!isDataLoaded) {
                alert("Please load CSV files first.");
                return;
            }

            const container = document.getElementById("chartsContainer");
            const selectedVessel = document.getElementById("vesselSelect").value;

            const availableVessels = Object.keys(vesselData).filter(
                (v) => vesselData[v] && vesselData[v].length > 0
            );
            const vessels =
                selectedVessel === "all"
                    ? availableVessels.sort((a, b) => a.localeCompare(b))
                    : [selectedVessel].filter((v) => availableVessels.includes(v));

            if (vessels.length === 0) {
                showError("No data available for the selected vessel(s).");
                return;
            }

            clearCharts();

            const xScaleOptions = {
                type: "time",
                time: { unit: "day", displayFormats: { day: "MMM dd" } },
                min: "2025-08-01",
                max: "2025-08-31",
                title: {
                    display: true,
                    text: "Date-Time (August 2025)",
                    font: { size: 13, weight: "bold" }
                },
                grid: { display: true, color: "rgba(0,0,0,0.06)" }
            };

            vessels.forEach((vesselName) => {
                const raw = vesselData[vesselName] || [];
                const grouped = groupConsecutiveStates(raw);

                const { block, canvas } = createVesselBlock(vesselName);
                container.appendChild(block);

                const chart = createVesselChart(canvas, vesselName, grouped, xScaleOptions);
                charts[vesselName] = chart;
            });

            updateStats(selectedVessel);
        }

        function filterByDate() {
            if (!isDataLoaded) {
                alert("Please load CSV files first.");
                return;
            }
            const selectedDate = document.getElementById("dateSelect").value;
            if (!selectedDate) {
                alert("Please select a date.");
                return;
            }
            renderForDate(selectedDate);
        }

        function renderForDate(selectedDate) {
            const container = document.getElementById("chartsContainer");
            const selectedVessel = document.getElementById("vesselSelect").value;

            const availableVessels = Object.keys(vesselData).filter(
                (v) => vesselData[v] && vesselData[v].length > 0
            );
            const vessels =
                selectedVessel === "all"
                    ? availableVessels.sort((a, b) => a.localeCompare(b))
                    : [selectedVessel].filter((v) => availableVessels.includes(v));

            if (vessels.length === 0) {
                showError("No data available for the selected vessel(s) on this date.");
                return;
            }

            clearCharts();

            const dayStart = new Date(`${selectedDate}T00:00:00`);
            const dayEnd = new Date(`${selectedDate}T23:59:59`);

            const xScaleOptions = {
                type: "time",
                time: { unit: "hour", displayFormats: { hour: "HH:mm" } },
                min: dayStart,
                max: dayEnd,
                title: {
                    display: true,
                    text: `Time on ${new Date(selectedDate).toLocaleDateString()}`,
                    font: { size: 13, weight: "bold" }
                },
                grid: { display: true, color: "rgba(0,0,0,0.06)" }
            };

            vessels.forEach((vesselName) => {
                const raw = vesselData[vesselName] || [];
                const filtered = filterDataForDate(raw, dayStart, dayEnd);
                const grouped = groupConsecutiveStates(filtered);

                const { block, canvas } = createVesselBlock(vesselName);
                container.appendChild(block);

                const chart = createVesselChart(canvas, vesselName, grouped, xScaleOptions);
                charts[vesselName] = chart;
            });

            updateStatsForDate(selectedDate, selectedVessel);
        }

        // ===== Stats =====
        function updateStats(selectedVessel) {
            const vessels = selectedVessel === "all" ? Object.keys(vesselData) : [selectedVessel];

            const monthStart = new Date("2025-08-01T00:00:00");
            const monthEnd = new Date("2025-08-31T23:59:59");

            const stats = {
                totalVessels: vessels.length,
                totalHours: 0,
                stateBreakdown: {} // { state: hours }
            };

            vessels.forEach((v) => {
                const data = vesselData[v];
                if (!data) return;

                data.forEach((entry) => {
                    const start = new Date(entry.start);
                    const end = new Date(entry.end);

                    if (isNaN(start) || isNaN(end)) return;

                    // Clip each period to the month range
                    const overlapStart = new Date(Math.max(start.getTime(), monthStart.getTime()));
                    const overlapEnd = new Date(Math.min(end.getTime(), monthEnd.getTime()));

                    if (overlapStart <= overlapEnd) {
                        const hours = (overlapEnd - overlapStart) / (1000 * 60 * 60);
                        const st = normalizeState(entry.state);

                        if (!stats.stateBreakdown[st]) stats.stateBreakdown[st] = 0;
                        stats.stateBreakdown[st] += hours;
                        stats.totalHours += hours;
                    }
                });
            });

            displayStats(stats);
        }

        function updateStatsForDate(selectedDate, selectedVessel) {
            const vessels = selectedVessel === "all" ? Object.keys(vesselData) : [selectedVessel];
            const dayStart = new Date(`${selectedDate}T00:00:00`);
            const dayEnd = new Date(`${selectedDate}T23:59:59`);

            const stats = { totalVessels: vessels.length, totalHours: 0, stateBreakdown: {} };

            vessels.forEach((v) => {
                const data = vesselData[v];
                if (!data) return;

                data.forEach((entry) => {
                    const start = new Date(entry.start);
                    const end = new Date(entry.end);
                    if (start <= dayEnd && end >= dayStart) {
                        const overlapStart = new Date(Math.max(start.getTime(), dayStart.getTime()));
                        const overlapEnd = new Date(Math.min(end.getTime(), dayEnd.getTime()));
                        const hours = (overlapEnd - overlapStart) / (1000 * 60 * 60);
                        stats.totalHours += hours;

                        const st = normalizeState(entry.state);
                        if (!stats.stateBreakdown[st]) stats.stateBreakdown[st] = { count: 0, hours: 0 };
                        stats.stateBreakdown[st].count++;
                        stats.stateBreakdown[st].hours += hours;
                    }
                });
            });

            displayStatsForDate(stats, selectedDate);
        }

        function displayStats(stats) {
            const statsContainer = document.getElementById("statsContainer");
            const stateCards = Object.entries(stats.stateBreakdown)
                .map(([state, hours]) => `
          <div class="stat-card">
            <div class="stat-number">${hours.toFixed(1)}h</div>
            <div class="stat-label">${state} Hours (Month)</div>
          </div>
        `).join("");

            statsContainer.innerHTML = `
        <div class="stat-card">
          <div class="stat-number">${stats.totalVessels}</div>
          <div class="stat-label">Total Vessels</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${stats.totalHours.toFixed(1)}h</div>
          <div class="stat-label">Total Hours (Month)</div>
        </div>
        ${stateCards}
      `;
        }

        function displayStatsForDate(stats, selectedDate) {
            const statsContainer = document.getElementById("statsContainer");
            statsContainer.innerHTML = `
        <div class="stat-card">
          <div class="stat-number">${stats.totalVessels}</div>
          <div class="stat-label">Total Vessels</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${stats.totalHours.toFixed(1)}</div>
          <div class="stat-label">Total Hours on ${new Date(selectedDate).toLocaleDateString()}</div>
        </div>
        ${Object.entries(stats.stateBreakdown)
                    .map(
                        ([state, data]) => `
          <div class="stat-card">
            <div class="stat-number">${data.hours.toFixed(1)}h</div>
            <div class="stat-label">${state} (${data.count} periods)</div>
          </div>`
                    )
                    .join("")}
      `;
        }
    </script>
</body>

</html>
